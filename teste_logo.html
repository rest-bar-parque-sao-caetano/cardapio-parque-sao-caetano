<!DOCTYPE html>

<head><meta charset="UTF-8">
<style>
body{font-family:sans-serif;padding:20px;}
svg{width:0;height:0;position:absolute;}
.teste{margin-bottom:30px;border:1px solid #ccc;padding:10px;}
.logo-crop{width:320px;overflow:hidden;position:relative;margin:0 auto;outline:2px solid red;}
.logo-crop img{position:absolute;left:-35px;top:-109px;width:382px;height:382px;max-width:none;}

<svg>

</svg>
