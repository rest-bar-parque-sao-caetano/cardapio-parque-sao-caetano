<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de QR Code — Cardápio Parque São Caetano</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --verde-tropa:#4b5b2e; --verde-tropa-escuro:#37451f;
    --laranja:#ee7d32; --creme:#f7f0dc; --marrom:#3b2f1e;
  }
  body{
    font-family:'Nunito',sans-serif; background:var(--verde-tropa);
    color:var(--creme); margin:0; padding:24px 16px 60px;
    display:flex; flex-direction:column; align-items:center; min-height:100vh;
  }
  h1{
    font-family:'Fredoka',sans-serif; color:var(--laranja); text-align:center;
    font-size:1.4rem; margin-bottom:4px;
  }
  p.sub{opacity:.85; font-size:.9rem; text-align:center; max-width:420px; margin-bottom:24px;}
  .painel{
    background:var(--creme); color:var(--marrom); border-radius:16px;
    padding:24px; max-width:420px; width:100%; box-shadow:0 8px 24px rgba(0,0,0,.25);
  }
  label{font-weight:700; font-size:.85rem; display:block; margin-bottom:6px;}
  input[type=text]{
    width:100%; padding:10px 14px; border-radius:10px; border:1px solid #cbb98f;
    font-size:.95rem; margin-bottom:14px; font-family:'Nunito',sans-serif;
  }
  button{
    font-family:'Fredoka',sans-serif; background:var(--laranja); color:#2b1d0e;
    border:none; padding:11px 20px; border-radius:24px; font-weight:600;
    font-size:.95rem; cursor:pointer; width:100%; margin-bottom:8px;
  }
  button:hover{background:#d4671f;}
  button.secundario{background:transparent; border:2px solid var(--verde-tropa); color:var(--verde-tropa);}
  #qrcode-raw{display:none;}
  #cartaoWrap{display:flex; justify-content:center; margin:18px 0;}
  #cartao{border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,.25); max-width:100%; height:auto;}
  .aviso{font-size:.78rem; color:#6b5c3e; text-align:center; margin-top:6px;}
</style>
</head>
<body>
  <h1>Gerador de QR Code do Cardápio</h1>
  <p class="sub">Cole o link do cardápio já hospedado, confirme o nome do restaurante e gere um cartão com QR code pronto para imprimir nas mesas.</p>

  <div class="painel">
    <label for="nome">Nome do restaurante</label>
    <input type="text" id="nome" value="Rest & Bar Parque São Caetano">

    <label for="tagline">Frase (opcional)</label>
    <input type="text" id="tagline" value="Aponte a câmara e veja o nosso cardápio">

    <label for="url">Link do cardápio</label>
    <input type="text" id="url" value="https://rest-bar-parque-sao-caetano.github.io/cardapio-parque-sao-caetano/cardapio.html" placeholder="https://...">

    <button onclick="gerar()">Gerar Cartão com QR Code</button>
    <button class="secundario" onclick="baixar()">Baixar PNG</button>

    <div id="qrcode-raw"></div>
    <div id="cartaoWrap"><canvas id="cartao" width="480" height="560"></canvas></div>
    <div class="aviso">Dica: teste o QR com o celular antes de imprimir.</div>
  </div>

<script>
  const CORES = {
    verdeTropa: '#4b5b2e',
    verdeTropaEscuro: '#37451f',
    laranja: '#ee7d32',
    laranjaEscuro: '#d4671f',
    creme: '#f7f0dc',
    marrom: '#2b1d0e'
  };

  function roundRectPath(ctx, x, y, w, h, r){
    if (typeof r === 'number') r = {tl:r, tr:r, br:r, bl:r};
    ctx.beginPath();
    ctx.moveTo(x + r.tl, y);
    ctx.lineTo(x + w - r.tr, y);
    ctx.arcTo(x + w, y, x + w, y + r.tr, r.tr);
    ctx.lineTo(x + w, y + h - r.br);
    ctx.arcTo(x + w, y + h, x + w - r.br, y + h, r.br);
    ctx.lineTo(x + r.bl, y + h);
    ctx.arcTo(x, y + h, x, y + h - r.bl, r.bl);
    ctx.lineTo(x, y + r.tl);
    ctx.arcTo(x, y, x + r.tl, y, r.tl);
    ctx.closePath();
  }

  function wrapText(ctx, text, cx, y, maxWidth, lineHeight, maxLines){
    const words = text.split(' ');
    let lines = [];
    let current = '';
    words.forEach(word => {
      const test = current ? current + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = word;
      } else {
        current = test;
      }
    });
    if (current) lines.push(current);
    if (maxLines && lines.length > maxLines) {
      lines = lines.slice(0, maxLines);
      lines[maxLines - 1] += '…';
    }
    const startY = y - ((lines.length - 1) * lineHeight) / 2;
    lines.forEach((line, i) => ctx.fillText(line, cx, startY + i * lineHeight));
    return lines.length;
  }

  function gerarQRRaw(url){
    return new Promise(resolve => {
      const holder = document.getElementById('qrcode-raw');
      holder.innerHTML = '';
      new QRCode(holder, {
        text: url,
        width: 280,
        height: 280,
        colorDark: CORES.verdeTropaEscuro,
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      requestAnimationFrame(() => requestAnimationFrame(() => {
        resolve(holder.querySelector('canvas'));
      }));
    });
  }

  async function desenharCartao(){
    const url = document.getElementById('url').value.trim();
    const nome = document.getElementById('nome').value.trim() || 'Rest & Bar Parque São Caetano';
    const tagline = document.getElementById('tagline').value.trim();
    if(!url) return;

    if (document.fonts && document.fonts.load) {
      await Promise.all([
        document.fonts.load('700 26px Fredoka'),
        document.fonts.load('italic 16px Nunito')
      ]);
    }

    const qrCanvas = await gerarQRRaw(url);

    const canvas = document.getElementById('cartao');
    const W = canvas.width, H = canvas.height;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);

    // card background
    ctx.fillStyle = CORES.creme;
    roundRectPath(ctx, 0, 0, W, H, 22);
    ctx.fill();

    // header
    const headerH = 118;
    ctx.save();
    roundRectPath(ctx, 0, 0, W, H, 22);
    ctx.clip();
    ctx.fillStyle = CORES.laranja;
    ctx.fillRect(0, 0, W, headerH);
    ctx.restore();

    ctx.fillStyle = CORES.marrom;
    ctx.textAlign = 'center';
    ctx.font = '700 27px Fredoka, sans-serif';
    wrapText(ctx, nome, W/2, headerH/2, W - 60, 32, 2);

    // QR code, centered on white rounded plate
    const qrSize = 280;
    const qrX = (W - qrSize) / 2;
    const qrY = headerH + 30;
    ctx.fillStyle = '#ffffff';
    roundRectPath(ctx, qrX - 14, qrY - 14, qrSize + 28, qrSize + 28, 16);
    ctx.fill();
    ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);

    // tagline
    if (tagline){
      ctx.fillStyle = CORES.verdeTropaEscuro;
      ctx.font = 'italic 600 16px Nunito, sans-serif';
      wrapText(ctx, tagline, W/2, qrY + qrSize + 46, W - 60, 22, 2);
    }

    // footer strip
    ctx.fillStyle = CORES.verdeTropa;
    ctx.font = '700 13px Fredoka, sans-serif';
    ctx.fillStyle = '#8a7c5c';
    ctx.fillText('CARDÁPIO DIGITAL', W/2, H - 20);
  }

  function gerar(){ desenharCartao(); }

  function baixar(){
    const canvas = document.getElementById('cartao');
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'qrcode-cardapio-parque-sao-caetano.png';
    a.click();
  }

  window.onload = gerar;
  ['nome','tagline','url'].forEach(id => {
    document.getElementById(id).addEventListener('change', gerar);
  });
</script>
</body>
</html>
